#cloud-config
# =============================================================================
#  TREK on DigitalOcean — one-shot Droplet bootstrap
# -----------------------------------------------------------------------------
#  HOW TO USE:
#    1. Edit the four lines marked "EDIT ME" inside the runcmd: block below.
#    2. Paste this entire file into the DigitalOcean Droplet creation form,
#       under "Advanced Options → Add Initialization scripts (cloud-init)".
#    3. Create the Droplet. ~3 minutes later, TREK is live at https://<your domain>.
#
#  Provisions: Docker + docker compose + UFW firewall + Caddy (auto Let's Encrypt
#  TLS, including WebSocket proxying for /ws) + TREK in front of a real persistent
#  disk at /opt/trek/{data,uploads}. Generated admin credentials are written to
#  /root/trek-credentials.txt (mode 0600) and echoed to the cloud-init log.
# =============================================================================

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw
  - openssl
  - docker.io
  - docker-compose-v2

write_files:
  - path: /opt/trek/docker-compose.yml
    permissions: '0644'
    content: |
      services:
        app:
          image: mauriceboe/trek:latest
          container_name: trek
          read_only: true
          security_opt:
            - no-new-privileges:true
          cap_drop:
            - ALL
          cap_add:
            - CHOWN
            - SETUID
            - SETGID
          tmpfs:
            - /tmp:noexec,nosuid,size=64m
          expose:
            - "3000"
          env_file: .env
          environment:
            - NODE_ENV=production
            - PORT=3000
            - FORCE_HTTPS=true
            - TRUST_PROXY=1
            - LOG_LEVEL=info
          volumes:
            - ./data:/app/data
            - ./uploads:/app/uploads
          restart: unless-stopped
          healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

        caddy:
          image: caddy:2-alpine
          container_name: caddy
          ports:
            - "80:80"
            - "443:443"
          env_file: .env
          volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
          restart: unless-stopped
          depends_on:
            - app

      volumes:
        caddy_data:
        caddy_config:

  - path: /opt/trek/Caddyfile
    permissions: '0644'
    content: |
      {$DOMAIN_NAME} {
          encode gzip zstd
          reverse_proxy app:3000
          tls {$LETSENCRYPT_EMAIL}
      }

  - path: /etc/systemd/system/trek.service
    permissions: '0644'
    content: |
      [Unit]
      Description=TREK family travel planner
      Requires=docker.service
      After=docker.service network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=true
      WorkingDirectory=/opt/trek
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down

      [Install]
      WantedBy=multi-user.target

runcmd:
  - |
    set -e

    # =========================================================================
    # === EDIT ME — set these four values before pasting ======================
    DOMAIN_NAME="trek.example.com"
    LETSENCRYPT_EMAIL="you@example.com"
    ADMIN_EMAIL="family@example.com"
    TZ="UTC"
    # =========================================================================

    mkdir -p /opt/trek/data /opt/trek/uploads

    ENCRYPTION_KEY="$(openssl rand -hex 32)"
    ADMIN_PASSWORD="$(openssl rand -base64 18 | tr -d '=+/' | cut -c1-20)"

    cat > /opt/trek/.env <<EOF
    DOMAIN_NAME=${DOMAIN_NAME}
    LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    TZ=${TZ}
    ENCRYPTION_KEY=${ENCRYPTION_KEY}
    APP_URL=https://${DOMAIN_NAME}
    ALLOWED_ORIGINS=https://${DOMAIN_NAME}
    ADMIN_EMAIL=${ADMIN_EMAIL}
    ADMIN_PASSWORD=${ADMIN_PASSWORD}
    EOF
    chmod 600 /opt/trek/.env

    cat > /root/trek-credentials.txt <<EOF
    ============================================================
     TREK is now provisioning at:
       https://${DOMAIN_NAME}

     First-boot admin login:
       Email:    ${ADMIN_EMAIL}
       Password: ${ADMIN_PASSWORD}

     Files on this Droplet:
       /root/trek-credentials.txt   (this file — keep private)
       /opt/trek/.env               (full config, including ENCRYPTION_KEY)
       /opt/trek/data/              (SQLite database — back this up)
       /opt/trek/uploads/           (user uploads — back this up)

     Common commands:
       systemctl status trek
       cd /opt/trek && docker compose logs -f
       cd /opt/trek && docker compose pull && docker compose up -d   # update
    ============================================================
    EOF
    chmod 600 /root/trek-credentials.txt

    ufw allow OpenSSH
    ufw allow 80/tcp
    ufw allow 443/tcp
    ufw --force enable

    systemctl enable --now docker
    systemctl daemon-reload
    systemctl enable --now trek.service

    echo "============================================================"
    echo " TREK bootstrap complete."
    echo " URL:      https://${DOMAIN_NAME}"
    echo " Admin:    ${ADMIN_EMAIL}"
    echo " Password: see /root/trek-credentials.txt"
    echo "============================================================"

final_message: "TREK provisioning finished. Point an A record at this Droplet's IPv4, then open https://<your domain>. Admin credentials are in /root/trek-credentials.txt (visible via the DigitalOcean web Console)."
